identifier = "com.construct.app"
version = "0.1.0"
product-name = "construct"

[build]
before-dev-command = "pnpm dev"
before-build-command = "pnpm build"
dev-url = "http://localhost:1420"
frontend-dist = "../dist"

[app]
windows = [
  { title = "Construct", width = 800, height = 600 }
]

[bundle]
active = true
targets = "all"
icon = ["icons/32x32.png", "icons/128x128.png", "icons/128x128@2x.png", "icons/icon.icns", "icons/icon.ico"]

[plugins]
opener = { }
sql = { }
